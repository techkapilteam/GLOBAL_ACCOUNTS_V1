<form [formGroup]="CashOnHandForm">
  <div class="section-content">
    <div class="screen-header">
      <h2>Cheques On Hand</h2>
    </div>

    <div class="section-content">
      <div class="row">
        <div class="col-md-12 col-xl-12"></div>
      </div>

      <div class="row" *ngIf="pcashonhandbalance!==0">
        <div class="col-md-6 col-xl-4" *ngIf="bankDropdowmHide">
          <div class="form-group">
            <label class="required-field">Bank</label>
            <select class="form-control"
                    id="banknameForLegal"
                    formControlName="banknameForLegal"
                    (change)="BankChange($event)">
              <option value="">Select</option>
              <option *ngFor="let bank of BankNamesList"
                      [value]="bank.pdepositbankname">
                {{bank.pdepositbankname}}
              </option>
            </select>
          </div>
        </div>

        <div class="col-md-3 col-xl-3">
          <div class="form-group mt-4 ml-4">
            <input class="form-check-input"
                   type="checkbox"
                   formControlName="asondate"
                   (change)="asOnChange($event)">
            <label class="required-field ml-3">As on</label>
          </div>
        </div>

        <div class="col-md-3 col-xl-3" *ngIf="fromdatevisible">
          <div class="form-group">
            <label class="required-field">From Date</label>
            <input class="form-control w-auto"
                   type="text"
                   formControlName="fromdate"
                   readonly
                   bsDatepicker>
          </div>
        </div>

        <div class="col-md-3 col-xl-3">
          <div class="form-group">
            <label class="required-field">{{datelable}}</label>
            <input class="form-control w-auto"
                   type="text"
                   formControlName="todate"
                   readonly
                   bsDatepicker
                   [disabled]="true">
          </div>
        </div>
      </div>

      <div class="row" *ngIf="pcashonhandbalance!==0">
        <div class="col-md-3 col-xl-3">
          <div class="form-group">
            <label class="required-field">CAO</label>
            <select class="form-control"
                    formControlName="bankname"
                    (change)="SelectBank($event)">
              <option value="">Select</option>
              <option *ngFor="let bank of BanksList"
                      [value]="bank.branchName">
                {{bank.branchName}}
              </option>
            </select>
          </div>
        </div>

        <div class="col-md-3 col-xl-3">
          <div class="form-group">
            <label class="required-field">Transaction Date</label>
            <input class="form-control w-auto"
                   type="text"
                   formControlName="ptransactiondate"
                   readonly
                   bsDatepicker>
          </div>
        </div>

        <div class="col-md-3 col-xl-3">
          <div class="d-flex mt-4">
            <button (click)="getCashOnHandData()"
                    class="btn btn-s-icon px-3 border-0"
                    [disabled]="disableShowbutton">
              <i class="fa"
                 [ngClass]="{'fa-spin fa-spinner': disableShowbutton}">
              </i>{{showbuttontext}}
            </button>
          </div>
        </div>
      </div>
      <div class="row" *ngIf="pcashonhandbalance!=0">
        <div class="col-md-6 col-xl-4">
          <div class="form-group">
            <label>
              Cash On Hand Balance :
              {{currencySymbol}}
              {{pcashonhandbalance | currency}}
            </label>
          </div>
        </div>
      </div>
    </div>

   
    <div class="section-content mt-2">
      <div class="row">
        <div class="col-md-12 col-xl-12">

         
          <div class="d-flex justify-content-end mb-2"
               *ngIf="gridData?.length > 0">
            <ul class="temp-ul d-flex align-items-center mb-0">

              <li class="temp-ico ml-2">
                <img src="assets/images/pdf-icon-blue.svg"
                     width="18px"
                     class="pt-2"
                     style="cursor:pointer;"
                     (click)="pdfOrprint('Pdf')" />
              </li>

              <li class="temp-ico ml-3">
                <img src="assets/images/print-icon-blue.svg"
                     width="18px"
                     class="pt-2"
                     style="cursor:pointer;"
                     (click)="pdfOrprint('Print')" />
              </li>

              <li class="temp-ico ml-3">
                <img src="assets/images/icon-excel.svg"
                     width="18px"
                     class="pt-2"
                     style="cursor:pointer;"
                     (click)="export()" />
              </li>
            </ul>
          </div>
          <p-table [value]="gridData"
                   dataKey="preceiptid"
                   [rows]="10"
                   [paginator]="false"
                   [resizableColumns]="true"
                   columnResizeMode="fit"
                   scrollable="true"
                   scrollHeight="400px"
                   styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">

            <ng-template pTemplate="header">
              <tr>
                <th>Subscriber Name</th>
                <th>Amount</th>
                <th>Receipt No</th>
                <th>Receipt Id</th>
                <th>Receipt Date</th>
              </tr>
            </ng-template>

            <ng-template pTemplate="body" let-row>
              <tr>
                <td>{{ row.ppartyname }}</td>
                <td>{{ row.ptotalreceivedamount | currency:'INR':'symbol':'1.2-2' }}</td>
                <td>{{ row.preceiptno }}</td>
                <td>{{ row.preceiptid }}</td>
                <td>{{ row.preceiptdate | date:'dd/MMM/yyyy' }}</td>
              </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="5" class="text-center">
                  No records found
                </td>
              </tr>
            </ng-template>

          </p-table>

        </div>
      </div>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <a (click)="Clear()"
         class="btn btn-g-icon mr-4 px-3 border-0">
         Clear
      </a>

      <div *ngIf="saveshowhide">
        <button (click)="Save()"
                class="btn btn-s-icon px-3 border-0"
                [disabled]="disablesavebutton">
          <i class="fa"
             [ngClass]="{'fa-spin fa-spinner': disablesavebutton}">
          </i> {{buttonname}}
        </button>
      </div>
    </div>

  </div>
</form>
