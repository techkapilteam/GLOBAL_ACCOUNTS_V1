<form [formGroup]="onlineprocessingform">
    <div class="screen-container">
        <div class="screen-card card shadow-sm p-4"
            style="border:1px solid #dce8fd; border-radius:12px; box-shadow: 0 4px 24px rgba(22,34,70,0.10) !important;">

            <!-- Header -->
            <div class="screen-header mb-4"
                style="padding: 14px 28px; display:flex; align-items:center; gap:10px; border-bottom: 3px solid #0d6efd; border-radius:10px 10px 0 0; margin: -24px -24px 24px -24px;">
                <h2 class="mb-0" style="margin:0; font-size:20px; font-weight:700; color:#070707;">Online Processing
                </h2>
            </div>

            <!-- Section 1: Paytm + Cashfree -->
            <div class="border rounded p-3 bg-white mb-4"
                style="border:1px solid #dce8fd !important; border-radius:10px !important; box-shadow: 0 2px 8px rgba(13,110,253,0.07);">

                <div class="row align-items-end">

                    <!-- Paytm Transaction Date -->
                    <div class="col-md-4">
                        <div class="row align-items-end">
                            <div class="col-md-7">
                                <div class="form-group mb-0">
                                    <label style="font-size:13px; font-weight:600; color:#162246;">Paytm Transaction
                                        Date</label>
                                    <input class="form-control" readonly type="text" title="Transaction Date"
                                        id="fromdate" formControlName="fromdate" (ngModelChange)="DateChange($event)"
                                        bsDatepicker [bsConfig]="dpConfig" placeholder=""
                                        [ngClass]="{ 'is-invalid': onlineformvalidation.fromdate }"
                                        style="font-size:13px; border:1.5px solid #cdd8f0; border-radius:7px; color:#162246;">
                                    <app-validation-message
                                        [messgae]="onlineformvalidation?.fromdate"></app-validation-message>
                                </div>
                            </div>
                            <div class="col-md-5 d-flex align-items-center" style="gap:10px;">
                                <button (click)="onlineupdatedata()" [disabled]="isdisabled2"
                                    class="btn btn-primary px-3"
                                    style="background:#0d6efd; border-color:#0d6efd; border-radius:7px; font-size:13px; font-weight:600; padding:6px 14px; white-space:nowrap;">
                                    <i class="fa" [ngClass]="{'fa-spin fa-spinner': disablesavebutton}"></i>
                                    {{ savebutton }}
                                </button>
                                <span *ngIf="iscompleted1"
                                    style="font-size:12px; font-weight:700; color:#198754; white-space:nowrap;">
                                    ✓ COMPLETED
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Cashfree Transaction Date -->
                    <div class="col-md-4">
                        <div class="row align-items-end">
                            <div class="col-md-7">
                                <div class="form-group mb-0">
                                    <label style="font-size:13px; font-weight:600; color:#162246;">Cashfree Transaction
                                        Date</label>
                                    <input class="form-control" readonly type="text" title="Cashfree"
                                        id="Cashfreefromdate" formControlName="Cashfreefromdate" bsDatepicker
                                        [bsConfig]="dpConfig" placeholder=""
                                        [ngClass]="{ 'is-invalid': onlineformvalidation.Cashfreefromdate }"
                                        style="font-size:13px; border:1.5px solid #cdd8f0; border-radius:7px; color:#162246;">
                                    <app-validation-message
                                        [messgae]="onlineformvalidation?.Cashfreefromdate"></app-validation-message>
                                </div>
                            </div>
                            <div class="col-md-5 d-flex align-items-center" style="gap:10px;">
                                <button (click)="onlineupdatedataCashfree()" [disabled]="CashFreedisabled"
                                    class="btn btn-primary px-3"
                                    style="background:#0d6efd; border-color:#0d6efd; border-radius:7px; font-size:13px; font-weight:600; padding:6px 14px; white-space:nowrap;">
                                    <i class="fa" [ngClass]="{'fa-spin fa-spinner': Cashfreedisablesavebutton}"></i>
                                    {{ Cashfreesavebutton }}
                                </button>
                                <span *ngIf="CashFreecompleted"
                                    style="font-size:12px; font-weight:700; color:#198754; white-space:nowrap;">
                                    ✓ COMPLETED
                                </span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Section 2: SQL Dump Transaction Date -->
            <div class="border rounded p-3 bg-white mb-4"
                style="border:1px solid #dce8fd !important; border-radius:10px !important; box-shadow: 0 2px 8px rgba(13,110,253,0.07);">

                <div class="row align-items-end">
                    <div class="col-md-4">
                        <div class="row align-items-end">
                            <div class="col-md-7">
                                <div class="form-group mb-0">
                                    <label style="font-size:13px; font-weight:600; color:#162246;">Transaction
                                        Date</label>
                                    <input class="form-control" readonly type="text" title="Transaction Date" id="date1"
                                        formControlName="date1" (ngModelChange)="DateChange($event)" bsDatepicker
                                        [bsConfig]="dpConfig" placeholder=""
                                        [ngClass]="{ 'is-invalid': onlineformvalidation.date1 }"
                                        style="font-size:13px; border:1.5px solid #cdd8f0; border-radius:7px; color:#162246;">
                                    <app-validation-message
                                        [messgae]="onlineformvalidation?.date1"></app-validation-message>
                                </div>
                            </div>
                            <div class="col-md-5 d-flex align-items-center" style="gap:10px;">
                                <button (click)="sqldumpeddata()" [disabled]="isdisabled" class="btn px-3"
                                    style="background:#6c757d; border-color:#6c757d; border-radius:7px; font-size:13px; font-weight:600; padding:6px 14px; color:#fff; white-space:nowrap;">
                                    <i class="fa" [ngClass]="{'fa-spin fa-spinner': disablesavebutton1}"></i>
                                    {{ savebutton1 }}
                                </button>
                                <span *ngIf="iscompleted"
                                    style="font-size:12px; font-weight:700; color:#198754; white-space:nowrap;">
                                    ✓ COMPLETED
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Section 3: Paytm Receipt + Summary Table -->
            <div class="border rounded p-3 bg-white mb-4"
                style="border:1px solid #dce8fd !important; border-radius:10px !important; box-shadow: 0 2px 8px rgba(13,110,253,0.07);">

                <div class="row align-items-end mb-4">
                    <div class="col-md-4">
                        <div class="row align-items-end">
                            <div class="col-md-7">
                                <div class="form-group mb-0">
                                    <label style="font-size:13px; font-weight:600; color:#162246;">Transaction
                                        Date</label>
                                    <input class="form-control" readonly type="text" title="Transaction Date" id="date2"
                                        formControlName="date2" (ngModelChange)="DateChange1($event)" bsDatepicker
                                        [bsConfig]="dpConfig" placeholder=""
                                        [ngClass]="{ 'is-invalid': onlineformvalidation.date2 }"
                                        style="font-size:13px; border:1.5px solid #cdd8f0; border-radius:7px; color:#162246;">
                                    <app-validation-message
                                        [messgae]="onlineformvalidation?.date2"></app-validation-message>
                                </div>
                            </div>
                            <div class="col-md-5 d-flex align-items-center" style="gap:10px;">
                                <button (click)="paytmreceipt()" [disabled]="isdisabled1" class="btn btn-primary px-3"
                                    style="background:#0d6efd; border-color:#0d6efd; border-radius:7px; font-size:13px; font-weight:600; padding:6px 14px; white-space:nowrap;">
                                    <i class="fa" [ngClass]="{'fa-spin fa-spinner': disablesavebutton2}"></i>
                                    {{ savebutton2 }}
                                </button>
                                <span *ngIf="iscompleted2"
                                    style="font-size:12px; font-weight:700; color:#198754; white-space:nowrap;">
                                    ✓ COMPLETED
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary Table -->
                <div class="row">
                    <div class="col-md-6">
                        <table style="width:100%; border-collapse:collapse;">
                            <thead>
                                <tr>
                                    <th
                                        style="background:#2E86C1 !important; color:#fff !important; font-size:16px; font-weight:700; padding:10px 14px; border-right:1px solid #2e4278; white-space:nowrap;">
                                        Payment Mode
                                    </th>
                                    <th
                                        style="background:#2E86C1 !important; color:#fff !important; font-size:16px; font-weight:700; padding:10px 14px; border-right:1px solid #2e4278; white-space:nowrap;">
                                        Status
                                    </th>
                                    <th class="text-right"
                                        style="background:#2E86C1 !important; color:#fff !important; font-size:16px; font-weight:700; padding:10px 14px; border-right:1px solid #2e4278; white-space:nowrap;">
                                        Count
                                    </th>
                                    <th class="text-right"
                                        style="background:#2E86C1 !important; color:#fff !important; font-size:16px; font-weight:700; padding:10px 14px; white-space:nowrap;">
                                        Amount
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let data of PaytmAutoreceiptCount">
                                    <td
                                        style="padding:8px 12px; font-size:13px; color:#2E86C1; border-bottom:1px solid #dce8fd;">
                                        {{ data.paymentmode }}
                                    </td>
                                    <td
                                        style="padding:8px 12px; font-size:13px; color:#2E86C1; border-bottom:1px solid #dce8fd;">
                                        <span *ngIf="data.trstatus == 'Y'"
                                            style="color:#198754; font-weight:600;">Cleared</span>
                                        <span *ngIf="data.trstatus == 'N'"
                                            style="color:#dc3545; font-weight:600;">Pending</span>
                                        <span *ngIf="data.trstatus == ''"></span>
                                    </td>
                                    <td class="text-right"
                                        style="padding:8px 12px; font-size:13px; color:#2E86C1; border-bottom:1px solid #dce8fd;">
                                        {{ data.count }}
                                    </td>
                                    <td class="text-right"
                                        style="padding:8px 12px; font-size:13px; color:#2E86C1; border-bottom:1px solid #dce8fd;">
                                        {{ currencysymbol }} {{ data.sum | currency:'INR':'symbol':'1.2-2' }}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </div>
</form>
